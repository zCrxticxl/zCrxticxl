<svg width="960" height="260" viewBox="0 0 960 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c13"/>
      <stop offset="50%" stop-color="#12102a"/>
      <stop offset="100%" stop-color="#1d0f38"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="960" height="260" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="958" height="258" rx="14" fill="none" stroke="#2c3454" stroke-width="1.5"/>

  <!-- floating particles -->
  <g fill="#38bdf8" opacity="0.5">
    <circle cx="120" cy="200" r="2"><animate attributeName="cy" values="200;40;200" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="60" r="1.6"><animate attributeName="cy" values="60;220;60" dur="11s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="180" r="2.2"><animate attributeName="cy" values="180;30;180" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="740" cy="80" r="1.8"><animate attributeName="cy" values="80;230;80" dur="10s" repeatCount="indefinite"/></circle>
    <circle cx="880" cy="150" r="2"><animate attributeName="cy" values="150;50;150" dur="7s" repeatCount="indefinite"/></circle>
  </g>

  <!-- crosshair (R6) -->
  <g transform="translate(850,80)" stroke="url(#acc)" stroke-width="3" filter="url(#glow)">
    <circle r="30" fill="none">
      <animate attributeName="r" values="30;34;30" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <path d="M0 -44 V-18 M0 18 V44 M-44 0 H-18 M18 0 H44"/>
    <circle r="3.5" fill="#38bdf8" stroke="none"/>
  </g>

  <text x="60" y="105" font-family="Segoe UI, Ubuntu, sans-serif" font-size="54" font-weight="800" fill="#e8ecf8">Hey, I'm Adrian</text>
  <text x="63" y="105" font-family="Segoe UI, Ubuntu, sans-serif" font-size="54" font-weight="800" fill="url(#acc)" opacity="0.25">Hey, I'm Adrian</text>

  <!-- typing line -->
  <g font-family="Consolas, JetBrains Mono, monospace" font-size="20" fill="#9aa4c4">
    <text x="62" y="150">&gt;
      <tspan fill="#38bdf8">
        system tuner · Rust &amp; Tauri dev · competitive R6 player
        <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze"/>
      </tspan>
      <tspan fill="#7c5cff">▌<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></tspan>
    </text>
  </g>

  <!-- stat pills -->
  <g font-family="Segoe UI, Ubuntu, sans-serif" font-size="14" font-weight="600">
    <rect x="60" y="178" width="230" height="30" rx="15" fill="#161d33" stroke="#7c5cff" stroke-opacity="0.5"/>
    <text x="175" y="198" fill="#a893ff" text-anchor="middle">⚡ AD HyperOptimize</text>
    <rect x="300" y="178" width="180" height="30" rx="15" fill="#161d33" stroke="#38bdf8" stroke-opacity="0.5"/>
    <text x="390" y="198" fill="#38bdf8" text-anchor="middle">🐧 Linux tooling</text>
    <rect x="490" y="178" width="210" height="30" rx="15" fill="#161d33" stroke="#4ade80" stroke-opacity="0.5"/>
    <text x="595" y="198" fill="#4ade80" text-anchor="middle">🎯 R6 · Team Manager</text>
  </g>

  <!-- bottom accent -->
  <rect x="0" y="252" width="960" height="8" rx="4" fill="url(#acc)" opacity="0.85"/>
</svg>
