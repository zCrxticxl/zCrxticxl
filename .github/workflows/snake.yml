name: generate snake

on:
  schedule:
    - cron: "0 3 * * *"   # täglich 03:00 UTC
  workflow_dispatch:       # manuell startbar
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: zCrxticxl
          outputs: |
            dist/github-snake.svg?color_snake=#7c5cff&color_dots=#161d33,#2c3454,#38bdf8,#7c5cff,#4ade80
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#7c5cff&color_dots=#161d33,#2c3454,#38bdf8,#7c5cff,#4ade80

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
